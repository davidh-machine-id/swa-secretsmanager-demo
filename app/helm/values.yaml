# Image configuration
image:
  repository: docker.io/library/demo-app
  tag: "latest"
  pullPolicy: IfNotPresent

# Namespace (use $APP_NAMESPACE from setup.env)
namespace: demo-app

# Service Account
serviceAccount:
  create: true
  name: demo-app-sa

# SWA Configuration
swa:
  nodegroup: k8s-nodegroup
  agentSocketPath: /tmp/swa-agent/public/api.sock

# Conjur Configuration
conjur:
  applianceUrl: "" # e.g., https://TENANT_ID.secretsmgr.cyberark.cloud/api
  account: conjur
  authnJwtServiceId: "" # e.g., my-demo
  jwtAudience: conjur
  secretId: "" # e.g., data/my-demo/secrets/demo-app/api-key

# Deployment Configuration
deployment:
  replicas: 1
  strategy:
    type: RollingUpdate
    maxSurge: 1
    maxUnavailable: 0

# Service Configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# Health Probes
probes:
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
